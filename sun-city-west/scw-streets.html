<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homes & Sales History by Street — Sun City West, AZ | Lona King &amp; Billy Heinzman</title>
<link rel="canonical" href="https://hometownaz.com/sun-city-west/scw-streets.html">
<meta name="description" content="Browse Sun City West homes and full sale history street by street. See active listings, median prices, and how fast homes sell on your street. By Lona King &amp; Billy Heinzman.">
<meta property="og:title" content="Sun City West Homes by Street">
<meta property="og:description" content="Active listings + 17 years of sale history for every Sun City West street.">
<meta property="og:type" content="website">
<meta name="robots" content="index, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&amp;display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#23291f; --ink-soft:#555d4a; --paper:#f6f2e9; --line:#e2dac8;
    --gold:#b8762e; --gold-deep:#8f5a1f; --olive:#4d6043; --olive-deep:#33402d; --card:#fffdf8;
    --cream:#faf6ed; --orange:#b8762e; --orange-deep:#8f5a1f;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;line-height:1.55;}
  a{color:var(--gold-deep);}
  .wrap{max-width:1080px;margin:0 auto;padding:0 22px;}
  .st-top{background:var(--olive-deep);color:#fff;padding:14px 0;}
  .st-top .wrap{display:flex;align-items:center;gap:14px;}
  .st-top a{color:#fff;text-decoration:none;font-weight:600;font-size:.9rem;opacity:.92;}
  .st-top a:hover{opacity:1;}
  .st-brand{font-family:'Fraunces',Georgia,serif;font-size:1.05rem;font-weight:600;margin-right:auto;}
  .st-hero{padding:38px 0 26px;}
  .st-kicker{color:var(--gold);font-style:italic;font-family:'Fraunces',Georgia,serif;font-size:1.05rem;}
  h1{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:2.3rem;line-height:1.1;margin:.2em 0 .3em;}
  .st-sub{color:var(--ink-soft);font-size:1.02rem;max-width:680px;}
  .st-stats{display:flex;flex-wrap:wrap;gap:0;border:1px solid var(--line);border-radius:12px;background:var(--card);margin:24px 0;overflow:hidden;}
  .st-stat{flex:1;min-width:140px;padding:18px 22px;border-right:1px solid var(--line);}
  .st-stat:last-child{border-right:none;}
  .st-stat b{display:block;font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:1.6rem;color:var(--olive-deep);line-height:1;}
  .st-stat span{display:block;font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-soft);margin-top:6px;}
  h2{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:1.5rem;margin:34px 0 14px;}
  .st-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}
  .st-card{border:1px solid var(--line);border-radius:12px;background:var(--card);overflow:hidden;text-decoration:none;color:inherit;transition:box-shadow .15s,transform .15s;display:block;}
  .st-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.1);transform:translateY(-2px);}
  .st-card-img{aspect-ratio:3/2;background:#efe7d6 center/cover no-repeat;position:relative;}
  .st-card-tag{position:absolute;top:10px;left:10px;background:var(--olive-deep);color:#fff;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:5px 10px;border-radius:3px;}
  .st-card-body{padding:14px 16px;}
  .st-card-price{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:1.25rem;color:var(--ink);}
  .st-card-addr{font-size:.92rem;font-weight:600;}
  .st-card-spec{font-size:.82rem;color:var(--ink-soft);margin-top:4px;}
  .st-none{color:var(--ink-soft);background:var(--card);border:1px dashed var(--line);border-radius:12px;padding:24px;text-align:center;}
  .st-prose{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px 24px;margin:24px 0;font-size:.96rem;color:var(--ink-soft);line-height:1.65;}
  .st-prose b{color:var(--ink);}
  .st-cta{display:block;text-align:center;background:var(--gold);color:#fff;font-weight:700;padding:15px;border-radius:10px;text-decoration:none;margin:10px 0;font-size:1rem;}
  .st-cta:hover{background:var(--gold-deep);color:#fff;}
  .st-cta.ghost{background:none;color:var(--olive-deep);border:1px solid var(--olive-deep);}
  .st-cta.ghost:hover{background:var(--olive-deep);color:#fff;}
  /* directory */
  .st-search{width:100%;font-family:inherit;font-size:1rem;padding:13px 16px;border:1px solid var(--line);border-radius:10px;background:var(--card);margin-bottom:18px;}
  .st-search:focus{outline:none;border-color:var(--gold);}
  .st-dir{columns:3;column-gap:26px;}
  .st-dir a{display:block;padding:5px 0;font-size:.9rem;text-decoration:none;color:var(--ink);break-inside:avoid;}
  .st-dir a:hover{color:var(--gold-deep);}
  .st-dir a span{color:var(--ink-soft);font-size:.8rem;}
  .footer-cta{background:var(--olive-deep);color:#fff;text-align:center;padding:40px 22px;margin-top:44px;}
  .footer-cta-title{font-family:'Fraunces',Georgia,serif;font-size:1.7rem;font-weight:600;}
  .footer-cta-sub{opacity:.9;margin:10px 0 18px;}
  .footer-cta-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .footer-btn{background:var(--gold);color:#fff;text-decoration:none;font-weight:700;padding:13px 22px;border-radius:8px;}
  .footer-btn:hover{background:var(--gold-deep);}
  @media(max-width:760px){.st-dir{columns:1;}h1{font-size:1.8rem;}.st-stat{min-width:46%;}}
</style>
</head>
<body>
<div class="st-top"><div class="wrap">
  <span class="st-brand">Hometown AZ</span>
  <a href="index.html">← Sun City West</a>
  <a href="index.html#home-finder">Home Finder</a>
</div></div>

<div class="wrap" id="st-main"></div>

<section class="footer-cta">
  <div class="footer-cta-title">Thinking about your street?</div>
  <div class="footer-cta-sub">Lona has sold 478 homes across Sun City West. Get a free, no-obligation read on your home's value or your next move.</div>
  <div class="footer-cta-row">
    <a class="footer-btn" href="tel:+16232036271">📞 Call Lona — (623) 203-6271</a>
    <a class="footer-btn" href="mailto:azlonaking@gmail.com">✉ Email Lona</a>
  </div>
</section>

<script src="../data-listings.js?v=20260614"></script>
<script src="scw-streets-data.js"></script>
<script>
(function(){
  function $(id){return document.getElementById(id);}
  function fmt(n){return '$'+Number(n||0).toLocaleString();}
  function tc(s){return String(s||'').toLowerCase().replace(/\b\w/g,function(c){return c.toUpperCase();});}
  function slugify(s){return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}

  var STREETS = window.SCW_STREETS || {};
  var LISTINGS = (window.ACTIVE_LISTINGS && window.ACTIVE_LISTINGS.active) || [];
  var MLS_INDEX = {};
  LISTINGS.forEach(function(x){ if(x.mls) MLS_INDEX[String(x.mls)] = x; });

  var params = new URLSearchParams(window.location.search);
  var slug = params.get('street');

  if(slug && STREETS[slug]){
    renderStreet(slug, STREETS[slug]);
  } else {
    renderDirectory();
  }

  function renderStreet(slug, d){
    var name = tc(d.name);
    document.title = 'Homes on ' + name + ', Sun City West AZ — Listings & Sale History | Lona King';
    setMeta('description', 'See active listings and ' + d.totalSales + ' historical sales on ' + name + ' in Sun City West, AZ. Median price ' + fmt(d.medPrice) + '. Local expertise from Lona King & Billy Heinzman.');
    setCanonical('https://hometownaz.com/sun-city-west/scw-streets.html?street=' + slug);

    var active = (d.activeMls||[]).map(function(m){return MLS_INDEX[String(m)];}).filter(Boolean);

    var cardsHtml = active.length ? '<div class="st-cards">' + active.map(function(x){
      var img = x.photo ? '<div class="st-card-img" style="background-image:url(\'' + x.photo + '\')"><span class="st-card-tag">For sale</span></div>'
                        : '<div class="st-card-img"><span class="st-card-tag">For sale</span></div>';
      return '<a class="st-card" href="index.html#home-finder" onclick="sessionStorage.setItem(\'hf_open_mls\',\'' + x.mls + '\')">'
        + img
        + '<div class="st-card-body">'
        + '<div class="st-card-price">' + fmt(x.price) + '</div>'
        + '<div class="st-card-addr">' + tc(x.addr) + '</div>'
        + '<div class="st-card-spec">' + (x.beds||'—') + ' bd · ' + (x.baths||'—') + ' ba · ' + (x.sqft?Number(x.sqft).toLocaleString():'—') + ' sqft</div>'
        + '</div></a>';
    }).join('') + '</div>'
    : '<div class="st-none">No active listings on ' + name + ' right now. Want to know the moment one hits the market? <a href="mailto:azlonaking@gmail.com?subject=Notify%20me%20about%20' + encodeURIComponent(name) + '">Ask Lona to watch this street for you →</a></div>';

    var span = (d.firstYear && d.lastSaleYear) ? (d.firstYear + '–' + d.lastSaleYear) : '';

    $('st-main').innerHTML =
      '<div class="st-hero">'
      + '<div class="st-kicker">Sun City West street profile</div>'
      + '<h1>Homes on ' + name + '</h1>'
      + '<p class="st-sub">Active listings and sale history for ' + name + ' in Sun City West, Arizona. Data drawn from ' + d.totalSales + ' recorded sales' + (span?(' ('+span+')'):'') + '.</p>'
      + '</div>'
      + '<div class="st-stats">'
      +   '<div class="st-stat"><b>' + active.length + '</b><span>For sale now</span></div>'
      +   '<div class="st-stat"><b>' + fmt(d.medPrice) + '</b><span>Median sale price</span></div>'
      +   '<div class="st-stat"><b>' + (d.medDom||'—') + '</b><span>Avg days to sell</span></div>'
      +   '<div class="st-stat"><b>' + d.totalSales + '</b><span>Recorded sales</span></div>'
      + '</div>'
      + '<h2>' + (active.length ? 'For sale on ' + name : 'Currently for sale') + '</h2>'
      + cardsHtml
      + '<div class="st-prose">'
      +   '<p><b>About ' + name + '.</b> This street sits within Sun City West, the original Del Webb 55+ active-adult community in Arizona\'s West Valley. Over the years ' + d.totalSales + ' homes have changed hands here, with a median sale price of ' + fmt(d.medPrice) + ' and homes typically going under contract in about ' + (d.medDom||'—') + ' days.</p>'
      +   '<p>Whether you\'re curious what your home on ' + name + ' might be worth today, or you\'re hoping to buy here, Lona King and Billy Heinzman know this community street by street. Reach out any time — no pressure, no agent gate.</p>'
      + '</div>'
      + '<a class="st-cta" href="mailto:azlonaking@gmail.com?subject=' + encodeURIComponent('My home on ' + name) + '&body=' + encodeURIComponent('Hi Lona,\n\nI\'d like a free valuation / more info about ' + name + ' in Sun City West.\n\nThanks!') + '">📩 What\'s my home on ' + name + ' worth?</a>'
      + '<a class="st-cta ghost" href="index.html#home-finder">Browse every Sun City West listing →</a>'
      + '<p style="margin-top:24px;font-size:.85rem;"><a href="scw-streets.html">← See all Sun City West streets</a></p>';

    injectSchema(name, slug, d, active);
  }

  function renderDirectory(){
    document.title = 'All Sun City West Streets — Homes & Sale History | Lona King & Billy Heinzman';
    setCanonical('https://hometownaz.com/sun-city-west/scw-streets.html');
    var keys = Object.keys(STREETS).sort(function(a,b){ return STREETS[a].name.localeCompare(STREETS[b].name); });
    var dirHtml = keys.map(function(k){
      var d = STREETS[k];
      var act = (d.activeMls||[]).length;
      return '<a href="scw-streets.html?street=' + k + '">' + tc(d.name) + ' <span>(' + (act?act+' for sale':d.totalSales+' sales') + ')</span></a>';
    }).join('');
    $('st-main').innerHTML =
      '<div class="st-hero">'
      + '<div class="st-kicker">Sun City West</div>'
      + '<h1>Homes &amp; sale history, street by street</h1>'
      + '<p class="st-sub">Every Sun City West street with recorded sales. Click any street to see what\'s for sale now and how homes there have sold over the years.</p>'
      + '</div>'
      + '<input type="text" class="st-search" id="st-search" placeholder="Search for your street…" oninput="window.stFilter(this.value)">'
      + '<div class="st-dir" id="st-dir">' + dirHtml + '</div>';

    window.stFilter = function(q){
      q = q.toLowerCase().trim();
      var links = $('st-dir').querySelectorAll('a');
      links.forEach(function(a){
        a.style.display = (!q || a.textContent.toLowerCase().indexOf(q)>=0) ? '' : 'none';
      });
    };
  }

  function setMeta(name, content){
    var m=document.querySelector('meta[name="'+name+'"]'); if(m) m.setAttribute('content', content);
  }
  function setCanonical(href){
    var l=document.querySelector('link[rel="canonical"]'); if(l) l.setAttribute('href', href);
  }
  function injectSchema(name, slug, d, active){
    var schema = {
      "@context":"https://schema.org",
      "@type":"RealEstateListing",
      "name":"Homes on "+name+", Sun City West AZ",
      "description":d.totalSales+" recorded sales on "+name+" in Sun City West, Arizona. Median price "+fmt(d.medPrice)+".",
      "url":"https://hometownaz.com/sun-city-west/scw-streets.html?street="+slug,
      "areaServed":{"@type":"Place","name":"Sun City West, Arizona"},
      "provider":{"@type":"RealEstateAgent","name":"Lona King & Billy Heinzman","telephone":"+1-623-203-6271","email":"azlonaking@gmail.com"}
    };
    var s=document.createElement('script'); s.type='application/ld+json'; s.textContent=JSON.stringify(schema); document.head.appendChild(s);
  }
})();
</script>
</body>
</html>
